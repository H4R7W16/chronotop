services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: chronotop
      POSTGRES_USER: chronotop
      POSTGRES_PASSWORD: chronotop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronotop -d chronotop"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://chronotop:chronotop@postgres:5432/chronotop
      PORT: 3000
      JWT_SECRET: change-me-in-production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
